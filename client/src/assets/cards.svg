<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="800" height="400">
  <!-- Card back pattern design -->
  <symbol id="card-back" viewBox="0 0 120 168">
    <rect width="120" height="168" rx="8" ry="8" fill="#2c3e50"/>
    <rect x="10" y="10" width="100" height="148" rx="4" ry="4" fill="#34495e" stroke="#2c3e50" stroke-width="2"/>
    <path d="M25,25 L95,25 L95,143 L25,143 Z" fill="#2c3e50" stroke="#3498db" stroke-width="2"/>
    
    <!-- Decorative pattern -->
    <path d="M60,40 L75,60 L60,80 L45,60 Z" fill="#3498db"/>
    <path d="M60,90 L75,110 L60,130 L45,110 Z" fill="#3498db"/>
    <circle cx="60" cy="60" r="5" fill="#e74c3c"/>
    <circle cx="60" cy="110" r="5" fill="#e74c3c"/>
  </symbol>
  
  <!-- Hearts -->
  <symbol id="heart" viewBox="0 0 30 30">
    <path d="M15,8 C15,-5 0,2 0,10 C0,18 15,24 15,24 C15,24 30,18 30,10 C30,2 15,-5 15,8 Z" fill="#E31B23"/>
  </symbol>
  
  <!-- Diamonds -->
  <symbol id="diamond" viewBox="0 0 30 30">
    <path d="M15,0 L30,15 L15,30 L0,15 Z" fill="#E31B23"/>
  </symbol>
  
  <!-- Clubs -->
  <symbol id="club" viewBox="0 0 30 30">
    <path d="M15,5 C15,5 10,5 10,10 C10,12.5 12.5,15 15,13 C15,13 15,18 10,18 C10,25 20,25 20,18 C15,18 15,13 15,13 C17.5,15 20,12.5 20,10 C20,5 15,5 15,5 Z" fill="#000000"/>
  </symbol>
  
  <!-- Spades -->
  <symbol id="spade" viewBox="0 0 30 30">
    <path d="M15,0 C15,0 5,10 5,16 C5,20 8,24 15,24 C8,24 8,30 15,30 C22,30 22,24 15,24 C22,24 25,20 25,16 C25,10 15,0 15,0 Z" fill="#000000"/>
  </symbol>
  
  <!-- Card template -->
  <symbol id="card-template" viewBox="0 0 120 168">
    <rect width="120" height="168" rx="8" ry="8" fill="white" stroke="black" stroke-width="1"/>
  </symbol>
  
  <!-- Card examples - we'll create one for each suit/rank combination -->
  
  <!-- Example: Ace of Hearts -->
  <symbol id="7-hearts" viewBox="0 0 120 168">
    <use href="#card-template"/>
    <text x="10" y="30" font-family="Arial" font-size="24" fill="#E31B23">7</text>
    <use href="#heart" width="15" height="15" x="10" y="35"/>
    <text x="110" y="158" font-family="Arial" font-size="24" fill="#E31B23" text-anchor="end">7</text>
    <use href="#heart" width="15" height="15" x="95" y="123"/>
    
    <!-- Card center patterns -->
    <use href="#heart" width="15" height="15" x="30" y="60"/>
    <use href="#heart" width="15" height="15" x="75" y="60"/>
    <use href="#heart" width="15" height="15" x="30" y="85"/>
    <use href="#heart" width="15" height="15" x="75" y="85"/>
    <use href="#heart" width="15" height="15" x="30" y="110"/>
    <use href="#heart" width="15" height="15" x="75" y="110"/>
    <use href="#heart" width="15" height="15" x="52.5" y="72.5"/>
  </symbol>
  
  <!-- Example: Ace of Diamonds -->
  <symbol id="A-diamonds" viewBox="0 0 120 168">
    <use href="#card-template"/>
    <text x="10" y="30" font-family="Arial" font-size="24" fill="#E31B23">A</text>
    <use href="#diamond" width="15" height="15" x="10" y="35"/>
    <text x="110" y="158" font-family="Arial" font-size="24" fill="#E31B23" text-anchor="end">A</text>
    <use href="#diamond" width="15" height="15" x="95" y="123"/>
    
    <!-- Card center patterns -->
    <use href="#diamond" width="35" height="35" x="42.5" y="66.5"/>
  </symbol>
  
  <!-- More card definitions would be defined similarly for all 32 cards -->
</svg>
