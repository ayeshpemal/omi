name: Deploy to EC2

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

# Add permissions to read contents and artifacts
permissions:
  actions: read
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      # Download server build artifacts from previous workflow
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      
      # Build the entire application including both server and client
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build application
        run: npm run build
      
      - name: Display structure of files
        run: |
          echo "Server build:"
          ls -la dist/
          echo "Client build:"
          ls -la dist/public/
      
      # Prepare production deployment package
      - name: Create production deployment package
        run: |
          # Create deployment directory
          mkdir -p deploy
          
          # Copy client build
          cp -r dist/public deploy/client
          
          # Copy package files
          cp package.json package-lock.json deploy/
          
          # Create a production server file that doesn't depend on Vite or other dev tools
          cat > deploy/server.js << 'EOF'
          const express = require('express');
          const path = require('path');
          
          const app = express();
          const PORT = process.env.PORT || 5000;
          
          // Serve static assets from the client build directory
          app.use(express.static(path.join(__dirname, 'client')));
          
          // API routes
          app.get('/api/health', (req, res) => {
            res.json({ status: 'ok', time: new Date().toISOString() });
          });
          
          // For any other route, serve the index.html
          app.get('*', (req, res) => {
            res.sendFile(path.join(__dirname, 'client/index.html'));
          });
          
          // Start the server
          app.listen(PORT, () => {
            console.log(`Server running on port ${PORT}`);
          });
          EOF
          
          # Create production package.json
          cat > deploy/package.json << EOF
          {
            "name": "omi-card-game",
            "version": "1.0.0",
            "description": "OMI Card Game - Sri Lankan 4-player trick-taking game",
            "main": "server.js",
            "scripts": {
              "start": "node server.js"
            },
            "dependencies": {
              "express": "^4.18.2"
            }
          }
          EOF
          
          # Create proper ecosystem.config.js file
          cat > deploy/ecosystem.config.js << EOF
          module.exports = {
            apps: [{
              name: "omi",
              script: "./server.js",
              env: {
                NODE_ENV: "production",
                PORT: 5000
              },
              instances: 1,
              exec_mode: "fork",
              watch: false,
              max_memory_restart: "500M"
            }]
          }
          EOF
          
          # Create deployment archive
          tar -czf deploy.tar.gz -C deploy .
      
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
      
      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          # Copy the archive to the EC2 instance
          scp deploy.tar.gz $EC2_USER@$EC2_HOST:~/
          
          # SSH into the instance and deploy
          ssh $EC2_USER@$EC2_HOST << 'EOF'
            echo "Starting deployment process..."
            
            # Stop existing application if running
            pm2 stop omi 2>/dev/null || true
            pm2 delete omi 2>/dev/null || true
            
            # Clean up old deployment and prepare for new one
            rm -rf ~/app/*
            mkdir -p ~/app
            
            # Extract the new build to app directory
            tar -xzf deploy.tar.gz -C ~/app
            
            # Install production dependencies
            cd ~/app
            npm install --production
            
            # Start the application with PM2
            pm2 start ecosystem.config.js
            pm2 save
            
            # Restart NGINX to ensure changes take effect
            echo "Restarting NGINX service..."
            sudo systemctl daemon-reload
            sudo systemctl restart nginx
            
            # Show PM2 status
            echo "PM2 status:"
            pm2 status
            
            # Wait a bit for the app to fully start
            echo "Waiting for application to start..."
            sleep 10
            
            # Check if the application is listening on port 5000
            echo "Checking port 5000:"
            netstat -tulpn 2>/dev/null | grep :5000 || ss -tulpn 2>/dev/null | grep :5000 || echo "Port 5000 not in use?"
            
            # Verify Nginx configuration
            echo "Verifying NGINX configuration:"
            sudo nginx -t
            
            # Check NGINX logs for errors
            echo "NGINX error logs (last 10 lines):"
            sudo tail -n 10 /var/log/nginx/error.log
            
            # Get application logs
            echo "Application logs (last 20 lines):"
            pm2 logs omi --lines 20 --nostream
            
            # Check deployed application
            echo "Testing API endpoint:"
            curl -s http://localhost:5000/api/health || echo "API endpoint not responding"
            
            # Clean up
            rm ~/deploy.tar.gz
            
            echo "Deployment complete!"
          EOF