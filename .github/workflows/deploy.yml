name: Deploy to EC2

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

# Add permissions to read contents and artifacts
permissions:
  actions: read
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      
      - name: Display structure of downloaded files
        run: ls -la dist/
      
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
      
      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          # Create a tar archive that includes both the build and package files
          tar -czf app.tar.gz dist/ package.json package-lock.json ecosystem.config.js
          
          # Copy the archive to the EC2 instance
          scp app.tar.gz $EC2_USER@$EC2_HOST:~/
          
          # Create minimal ecosystem file for PM2
          cat > ecosystem.config.js << EOF
          module.exports = {
            apps: [{
              name: "omi",
              script: "./dist/index.js",
              env: {
                NODE_ENV: "production",
                PORT: 5000
              },
              instances: 1,
              exec_mode: "fork"
            }]
          }
          EOF
          
          # Copy ecosystem file to EC2
          scp ecosystem.config.js $EC2_USER@$EC2_HOST:~/
          
          # SSH into the instance and deploy
          ssh $EC2_USER@$EC2_HOST << 'EOF'
            echo "Starting deployment process..."
            
            # Stop existing application if running
            pm2 stop omi 2>/dev/null || true
            pm2 delete omi 2>/dev/null || true
            
            # Clean up old deployment and prepare for new one
            rm -rf ~/app/*
            mkdir -p ~/app
            
            # Extract the new build to app directory
            tar -xzf app.tar.gz -C ~/app
            
            # Move ecosystem config
            cp ecosystem.config.js ~/app/
            
            # Display the contents to verify
            echo "Verifying extracted files:"
            ls -la ~/app
            ls -la ~/app/dist
            
            # Install production dependencies
            cd ~/app
            npm ci --omit=dev
            
            # Set environment to production
            export NODE_ENV=production
            export PORT=5000
            
            # Start the application with PM2 using the ecosystem file
            cd ~/app
            pm2 start ecosystem.config.js
            
            # Save PM2 configuration to persist across reboots
            pm2 save
            
            # Show running processes
            pm2 status
            
            # Check the logs for errors
            echo "Application logs (last 20 lines):"
            pm2 logs omi --lines 20 || echo "No logs available yet"
            
            # Check if the application is listening on port 5000
            echo "Checking port 5000:"
            netstat -tulpn | grep :5000 || ss -tulpn | grep :5000 || echo "Port 5000 not in use?"
            
            # Check NGINX status
            echo "NGINX status:"
            sudo systemctl status nginx | head -n 10
            
            # Check NGINX logs for errors
            echo "NGINX error logs (last 10 lines):"
            sudo tail -n 10 /var/log/nginx/error.log
            
            # Clean up
            rm ~/app.tar.gz
            rm ~/ecosystem.config.js
            
            echo "Deployment complete!"
          EOF